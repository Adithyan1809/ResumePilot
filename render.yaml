services:
  - type: web
    name: resumeai-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumeai-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://resume-pilot-1a81dpu38-adithyan-p-s-projects.vercel.app", "https://resume-pilot.vercel.app"]'
      - key: GROK_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: resumeai-db
    databaseName: resumeai
    plan: free
    region: oregon
