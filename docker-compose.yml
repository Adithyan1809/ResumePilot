version: "3.9"

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: resumeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumeai_password}
      POSTGRES_DB: ${POSTGRES_DB:-resumeai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumeai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # FastAPI Backend
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumeai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resumeai}:${POSTGRES_PASSWORD:-resumeai_password}@postgres:5432/${POSTGRES_DB:-resumeai}
      SECRET_KEY: ${SECRET_KEY:-4eb806de159e450969e30fb46525afa07f1e2998c4c4fceb12f8d2b0de8d2a0}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_BASE_URL: ${GROK_BASE_URL:-https://api.x.ai/v1}
      GROK_MODEL: ${GROK_MODEL:-grok-3-mini-fast}
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ==========================================================================
  # Next.js Frontend
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumeai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  upload_data:
    driver: local
